<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>北京旅行手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        :root { --cute-pink: #FF85A1; --jp-ink: #2D3436; }
        body { font-family: 'Noto Sans HK', sans-serif; background-color: #FFF9F9; color: var(--jp-ink); -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .day-card.active { background: var(--cute-pink); color: white; transform: scale(1.05); box-shadow: 0 10px 20px rgba(255,133,161,0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; }
        .img-fallback { background: linear-gradient(45deg, #FFE4E9, #FF85A1); }
    </style>
</head>
<body class="pb-36">

    <input type="file" id="banner-upload" class="hidden" accept="image/*">
    <input type="file" id="event-upload" class="hidden" accept="image/*">
    <input type="file" id="doc-upload" class="hidden" accept="image/*">

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" class="max-w-[90%] max-h-[80vh] rounded-xl border-4 border-white"></div>

    <header class="sticky top-0 z-50 glass border-b border-pink-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[var(--cute-pink)] rounded-lg flex items-center justify-center text-white rotate-3"><i class="fas fa-music text-xs"></i></div>
            <h1 class="text-sm font-black">北京旅行</h1>
        </div>
        <button id="edit-btn" onclick="toggleEdit()" class="px-4 py-1.5 bg-[var(--jp-ink)] text-white rounded-xl font-bold text-[10px]">編輯</button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <section id="page-itinerary">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-pink-50 flex items-center gap-2">
                    <i class="fas fa-cloud-sun text-orange-300"></i>
                    <span id="temp" class="text-[10px] font-bold text-gray-600 italic">15°C 北京</span>
                </div>
                <div class="bg-white p-2 rounded-2xl shadow-sm border border-pink-50 flex items-center gap-1">
                    <input type="number" id="cny" oninput="calc('cny')" placeholder="¥" class="w-full text-[10px] outline-none font-bold bg-gray-50 p-1 rounded">
                    <span class="text-[8px] opacity-20">換</span>
                    <input type="number" id="hkd" oninput="calc('hkd')" placeholder="$" class="w-full text-[10px] outline-none font-bold bg-pink-50 p-1 rounded">
                </div>
            </div>

            <div id="day-bar" class="flex gap-3 overflow-x-auto no-scrollbar mb-6 py-2"></div>

            <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-white">
                <div class="h-48 relative img-fallback">
                    <img id="main-banner" src="" class="w-full h-full object-cover" onerror="this.style.display='none'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                    <button id="btn-change-banner" onclick="trigger('banner-upload')" class="hidden absolute top-4 right-4 w-8 h-8 bg-white/20 backdrop-blur rounded-lg text-white text-[10px]"><i class="fas fa-camera"></i></button>
                    <div class="absolute bottom-6 left-6 text-white">
                        <span id="day-num" class="text-[9px] font-black bg-[var(--cute-pink)] px-2 py-0.5 rounded-full">DAY 1</span>
                        <div id="day-title-box" class="mt-1"></div>
                    </div>
                </div>
                
                <div class="p-6">
                    <div id="event-list" class="space-y-6"></div>
                    <button id="btn-add-event" onclick="addEvent()" class="hidden w-full mt-6 py-3 border-2 border-dashed border-pink-100 rounded-xl text-[10px] text-pink-300 font-bold">+ 新增地點</button>
                </div>
            </div>
        </section>

        <section id="page-tools" class="hidden space-y-6">
            <div class="bg-[var(--jp-ink)] p-6 rounded-[2rem] text-white">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black tracking-widest uppercase">重要文件備份</h2>
                    <button onclick="trigger('doc-upload')" id="btn-up-doc" class="hidden text-[9px] bg-[var(--cute-pink)] px-3 py-1 rounded-lg">上傳文件</button>
                </div>
                <div id="doc-grid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border border-pink-50">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black text-gray-800">行李清單</h2>
                    <button onclick="addCheck()" id="btn-add-check" class="hidden text-[9px] text-pink-400 font-bold">+ 新增</button>
                </div>
                <div id="check-list" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[80%] max-w-xs glass rounded-full border border-white shadow-2xl z-[100] flex p-1.5 gap-1">
        <button onclick="nav('itinerary')" id="nav-itinerary" class="flex-1 py-3 rounded-full bg-[var(--jp-ink)] text-white text-[10px] font-black">行程</button>
        <button onclick="nav('tools')" id="nav-tools" class="flex-1 py-3 rounded-full text-gray-400 text-[10px] font-black">工具</button>
    </nav>

    <script>
        const KEY = 'BJ_TRIP_V3';
        const rate = 1.13;
        let data = JSON.parse(localStorage.getItem(KEY)) || {
            days: [
                { d: "4/2", w: "四", t: "抵達北京LABUBU", img: "https://images.unsplash.com/photo-1508804185872-d7badad00f7d", ev: [] },
                { d: "4/3", w: "五", t: "探索頤和園", img: "https://images.unsplash.com/photo-1547984609-4b7497268d91", ev: [] },
                { d: "4/4", w: "六", t: "天譚", img: "https://images.unsplash.com/photo-1599571234909-29ed5d13c1d6", ev: [] },
                { d: "4/5", w: "日", t: "萬里長城", img: "https://images.unsplash.com/photo-1547150624-8904471f005a", ev: [] },
                { d: "4/6", w: "一", t: "故宮探索", img: "https://images.unsplash.com/photo-1584348259051-700683070737", ev: [] },
                { d: "4/7", w: "二", t: "賦歸", img: "https://images.unsplash.com/photo-1518544861942-835384168015", ev: [] }
            ],
            docs: [],
            checks: [{ n: "回鄉證", c: true }, { n: "大提琴配件", c: false }]
        };

        let currIdx = 0, isEdit = false, activeEvIdx = null;

        function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
        function trigger(id) { document.getElementById(id).click(); }
