<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>北京「弦動古都」6 日 5 夜詳細行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        :root { --cute-pink: #FF85A1; --cute-blue: #7FB3D5; --jp-ink: #2D3436; }
        body { font-family: 'Noto Sans JP', 'Microsoft JhengHei', sans-serif; background-color: #FFF9F9; color: var(--jp-ink); -webkit-tap-highlight-color: transparent; }
        .cloud-bg { background: radial-gradient(circle at 50% 100%, white 10%, #FFEDF1 100%); position: absolute; inset: 0; pointer-events: none; opacity: 0.5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .day-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .day-card.active { background: var(--cute-pink); color: white; transform: scale(1.1) rotate(-2deg); box-shadow: 0 10px 25px -5px rgba(255, 133, 161, 0.5); }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 80vh; border-radius: 24px; border: 8px solid white; }
        .img-gradient { background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.6)); }
        .timeline-line { position: absolute; left: 24px; top: 0; bottom: 0; width: 4px; background: #FFE4E9; z-index: 0; border-radius: 2px; }
        .timeline-dot { position: absolute; left: 18px; width: 16px; height: 16px; border-radius: 50%; background: var(--cute-pink); border: 4px solid white; z-index: 10; margin-top: 4px; }
        .btn-tap { transition: transform 0.1s; cursor: pointer; }
        .btn-tap:active { transform: scale(0.92); }
        .tag-pink { background: #FFEDF1; color: #FF6B81; }
    </style>
</head>
<body class="pb-36">

    <input type="file" id="banner-img-input" class="hidden" accept="image/*">
    <input type="file" id="event-img-input" class="hidden" accept="image/*">
    <input type="file" id="lib-file-input" class="hidden" accept="image/*">

    <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-pink-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-pink-400 tracking-widest">可愛加載中...</p>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
        <p class="mt-6 text-white font-bold text-sm bg-white/20 px-6 py-2 rounded-full backdrop-blur-md">點擊任意處關閉 ✨</p>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-pink-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[var(--cute-pink)] rounded-2xl flex items-center justify-center text-white text-lg shadow-md rotate-3">
                <i class="fas fa-heart"></i>
            </div>
            <div>
                <h1 class="text-base font-black text-gray-800 tracking-tight">北京小旅行</h1>
                <p class="text-[9px] font-bold text-pink-300 tracking-[0.2em] uppercase">Sapporo Music 2026</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="resetData()" class="p-2 text-gray-200"><i class="fas fa-sync-alt text-sm"></i></button>
            <button id="edit-btn" onclick="toggleEdit()" class="btn-tap px-5 py-2 bg-[var(--jp-ink)] text-white rounded-2xl font-black text-[11px] shadow-lg">編輯行程</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <section id="content-itinerary" class="space-y-6 animate-pop">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-[2rem] shadow-sm flex items-center gap-3 border border-pink-50">
                    <div id="weather-icon" class="text-2xl text-orange-300"><i class="fas fa-sun"></i></div>
                    <div>
                        <p id="weather-display" class="text-xs font-black text-gray-700">北京 讀取中</p>
                        <p class="text-[9px] text-orange-300 font-bold tracking-widest uppercase">今日天氣</p>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-pink-50">
                    <div class="flex items-center gap-1">
                        <input type="number" id="cny-input" oninput="convertCurrency('cny')" placeholder="¥ 人民幣" class="w-full bg-gray-50 rounded-xl p-1.5 text-[10px] font-black outline-none focus:ring-1 ring-pink-200">
                        <span class="text-pink-200 text-[10px]">❤</span>
                        <input type="number" id="hkd-input" oninput="convertCurrency('hkd')" placeholder="$ 港幣" class="w-full bg-pink-50 rounded-xl p-1.5 text-[10px] font-black outline-none text-pink-600">
                    </div>
                    <p class="text-[8px] text-gray-400 font-bold tracking-widest uppercase mt-1 text-center">匯率 1.13</p>
                </div>
            </div>

            <div class="flex gap-4 overflow-x-auto no-scrollbar py-3 px-1" id="day-selector"></div>

            <div id="day-details" class="bg-white rounded-[3rem] overflow-hidden shadow-2xl shadow-pink-100/50 border border-white relative">
                <div class="cloud-bg"></div>
                <div id="day-banner" class="h-64 relative bg-gray-100">
                    <img id="day-img" src="" class="w-full h-full object-cover" onclick="openLightbox(this.src)">
                    <div class="absolute inset-0 img-gradient"></div>
                    <button id="banner-upload-btn" onclick="triggerInput('banner-img-input')" class="hidden absolute top-6 right-6 w-12 h-12 bg-white/30 backdrop-blur-xl rounded-2xl text-white flex items-center justify-center btn-tap shadow-lg">
                        <i class="fas fa-camera text-lg"></i>
                    </button>
                    <div class="absolute bottom-8 left-8 right-8 flex justify-between items-end text-white">
                        <div>
                            <span id="day-label" class="inline-block px-3 py-1 bg-[var(--cute-pink)] rounded-xl text-[10px] font-black mb-2 tracking-widest shadow-md">DAY 1</span>
                            <div id="day-title-container"></div>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold opacity-70 tracking-widest mb-1">今日預算</p>
                            <p id="day-budget" class="text-2xl font-black italic">¥ 0</p>
                        </div>
                    </div>
                </div>
                <div class="p-8 relative">
                    <div id="timeline" class="space-y-10 relative min-h-[150px]"></div>
                    <div id="add-event-container" class="hidden mt-10">
                        <button onclick="addEvent()" class="w-full py-5 border-4 border-dashed border-pink-100 rounded-[2rem] text-pink-200 font-black text-xs tracking-widest hover:bg-pink-50 transition-colors">+ 新增行程景點 ✨</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="content-tools" class="hidden space-y-6">
            <div class="bg-[var(--jp-ink)] p-8 rounded-[3rem] text-white">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black uppercase tracking-widest">重要文件備份</h2>
                    <button id="add-doc-btn" onclick="triggerInput('lib-file-input')" class="hidden px-4 py-2 bg-[var(--cute-pink)] rounded-xl text-[10px] font-black">上傳</button>
                </div>
                <div id="document-list" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div class="bg-white p-8 rounded-[3rem] border border-pink-50">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black text-gray-800">行李清單</h2>
                    <button id="add-check-btn" onclick="addCheckItem()" class="hidden px-3 py-1 bg-pink-50 text-pink-500 rounded-lg text-[10px]">+ 新增</button>
                </div>
                <div id="checklist" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[2.5rem] border border-white shadow-2xl z-[100] flex p-2 gap-2 shadow-pink-200/50">
        <button onclick="switchTab('itinerary')" id="tab-itinerary" class="flex-1 py-4 flex flex-col items-center justify-center gap-1 rounded-[2rem] transition-all bg-[var(--jp-ink)] text-white shadow-lg">
            <i class="fas fa-map-marked-alt text-base"></i>
            <span class="text-[9px] font-black tracking-tighter">每日行程</span>
        </button>
        <button onclick="switchTab('tools')" id="tab-tools" class="flex-1 py-4 flex flex-col items-center justify-center gap-1 rounded-[2rem] transition-all text-gray-400">
            <i class="fas fa-toolbox text-base"></i>
            <span class="text-[9px] font-black tracking-tighter">旅行工具</span>
        </button>
    </nav>

    <script>
        const STORE_KEY = 'BEIJING_TRIP_2026';
        const exchangeRate = 1.132; // 1 CNY = 1.132 HKD
        let currentDayIdx = 0;
        let isEditing = false;
        let activeEventIdx = null;

        const defaultData = {
            itinerary: [
                { date: "4/2", weekday: "四", title: "抵達北京 · 古都初探", img: "https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=800", events: [{ timeFrom: "14:00", loc: "北京首都機場", desc: "開啟大提琴藝術之旅 🎻", cost: 0 }] },
                { date: "4/3", weekday: "五", title: "故宮博物院 · 深度遊", img: "https://images.unsplash.com/photo-1547984609-4b7497268d91?w=800", events: [] },
                { date: "4/4", weekday: "六", title: "清明時節 · 頤和園", img: "https://images.unsplash.com/photo-1599571234909-29ed5d13c1d6?w=800", events: [] },
                { date: "4/5", weekday: "日", title: "長城好漢 · 萬里征途", img: "https://images.unsplash.com/photo-1547150624-8904471f005a?w=800", events: [] },
                { date: "4/6", weekday: "一", title: "胡同尋寶 · 老北京味", img: "https://images.unsplash.com/photo-1584348259051-700683070737?w=800", events: [] },
                { date: "4/7", weekday: "二", title: "感悟京城 · 賦歸", img: "https://images.unsplash.com/photo-1518544861942-835384168015?w=800", events: [] }
            ],
            checklist: [{ task: "回鄉證", done: true }, { task: "防曬用品", done: false }],
            links: [{ title: "北京地鐵官方圖", url: "https://www.bjsubway.com/station/xlt/" }],
            documents: []
        };

        let appData = JSON.parse(JSON.stringify(defaultData));

        function loadData() { const saved = localStorage.getItem(STORE_KEY); if (saved) appData = JSON.parse(saved); }
        function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(appData)); }

        function convertCurrency(type) {
            const cny = document.getElementById('cny-input');
            const hkd = document.getElementById('hkd-input');
            if (type === 'cny') hkd.value = (cny.value * exchangeRate).toFixed(2);
            else cny.value = (hkd.value / exchangeRate).toFixed(2);
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=39.9042&longitude=116.4074&current_weather=true');
                const data = await res.json();
                document.getElementById('weather-display').innerText = `${Math.round(data.current_weather.temperature)}°C 北京`;
            } catch (e) { document.getElementById('weather-display').innerText = '12°C 北京'; }
        }

        function renderDay(idx) {
            currentDayIdx = idx;
            const day = appData.itinerary[idx];
            document.getElementById('day-img').src = day.img;
            const [month, date] = day.date.split('/');
            document.getElementById('day-label').innerText = `第 ${idx + 1} 天 · ${month}月${date}日`;
            
            const titleCont = document.getElementById('day-title-container');
            titleCont.innerHTML = isEditing ? `<input type="text" oninput="appData.itinerary[${idx}].title=this.value" value="${day.title}" class="w-full bg-white/20 border-b border-white text-xl text-white outline-none">` : `<h2 class="text-2xl font-black text-white drop-shadow-md">${day.title}</h2>`;

            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '<div class="timeline-line"></div>';
            day.events.forEach((ev, i) => {
                timeline.innerHTML += `
                    <div class="relative pl-12 animate-pop">
                        <div class="timeline-dot"></div>
                        <p class="text-[10px] font-black text-pink-200 uppercase">${ev.timeFrom || '09:00'}</p>
                        <h3 class="font-black text-lg text-gray-800">${ev.loc}</h3>
                        <p class="text-xs text-gray-500">${ev.desc || ''}</p>
                    </div>`;
            });
            document.querySelectorAll('.day-card').forEach((el, i) => el.classList.toggle('active', i === idx));
        }

        function initDaySelector() {
            const s = document.getElementById('day-selector'); s.innerHTML = '';
            appData.itinerary.forEach((day, i) => {
                const [month, date] = day.date.split('/');
                s.innerHTML += `
                <button onclick="renderDay(${i})" class="day-card flex-shrink-0 w-16 h-24 rounded-[2rem] flex flex-col items-center justify-center bg-white border border-pink-50 shadow-sm">
                    <span class="text-[8px] font-black opacity-30 uppercase">${month}月</span>
                    <span class="text-lg font-black">${date}</span>
                    <span class="text-[8px] font-bold opacity-30 mt-1">週${day.weekday}</span>
                </button>`;
            });
        }

        function switchTab(tab) {
            document.getElementById('content-itinerary').classList.toggle('hidden', tab !== 'itinerary');
            document.getElementById('content-tools').classList.toggle('hidden', tab !== 'tools');
        }

        function toggleEdit() {
            isEditing = !isEditing;
            const btn = document.getElementById('edit-btn');
            btn.innerText = isEditing ? '儲存行程' : '編輯行程';
            btn.classList.toggle('bg-green-500', isEditing);
            if (!isEditing) saveData();
            renderDay(currentDayIdx);
        }

        function resetData() { if(confirm("重設所有資料？")) { localStorage.removeItem(STORE_KEY); location.reload(); } }
        function triggerInput(id) { document.getElementById(id).click(); }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        window.onload = () => { loadData(); initDaySelector(); renderDay(0); fetchWeather(); };
    </script>
</body>
</html>
