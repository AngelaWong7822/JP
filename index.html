<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FF85A1">
    <meta name="description" content="離線也能查看的旅行行程規劃工具">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="旅行筆記">
    <title>專屬你的旅行筆記</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="vendor/tailwind.css">
    <link rel="stylesheet" href="vendor/fonts/noto-sans-tc.css">
    <link rel="stylesheet" href="vendor/fontawesome/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-boot" class="app-boot" aria-live="polite">載入中…</div>

    <div id="status-banner-stack" class="status-banner-stack hidden" role="status" aria-live="polite"></div>

    <input type="file" id="banner-img-input" class="hidden" accept="image/*">
    <input type="file" id="event-img-input" class="hidden" accept="image/*">
    <input type="file" id="lib-file-input" class="hidden" accept="image/*,application/pdf,.pdf">
    <div id="lightbox" role="dialog" aria-label="圖片預覽">
        <button type="button" id="lightbox-close" onclick="closeLightbox()" aria-label="關閉"><i class="fas fa-times"></i></button>
        <div id="lightbox-viewport">
            <img id="lightbox-img" alt="預覽">
        </div>
        <p id="lightbox-hint">雙指縮放 · 滾輪放大 · Esc 關閉</p>
    </div>

    <div id="toast" role="status"></div>

    <!-- Header -->
    <header class="app-header sticky top-0 z-50 glass border-b border-default px-4 py-3 flex justify-between items-center relative">
        <div class="flex items-center gap-2 overflow-hidden min-w-0 flex-1">
            <button type="button" id="header-menu-btn" onclick="toggleHeaderMenu()" class="flex-shrink-0 w-11 h-11 bg-[var(--cute-pink)] rounded-2xl flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform" aria-label="旅程選單" aria-expanded="false" aria-controls="header-menu">
                <i class="fas fa-plane-departure"></i>
            </button>
            <div class="flex flex-col min-w-0 flex-1">
                <h1 id="trip-title" class="truncate">我的旅行</h1>
                <p id="header-subtitle" class="truncate">開始規劃！</p>
            </div>
        </div>
        <div id="header-menu" class="hidden" role="menu">
            <p class="type-micro text-muted mb-2 px-0.5">我的旅程</p>
            <div id="trip-picker" class="trip-picker" role="listbox" aria-label="選擇旅程"></div>
            <div class="header-menu-actions">
                <button type="button" onclick="editTripName(); closeHeaderMenu();" class="bg-pink-50 text-pink-600">改名</button>
                <button type="button" onclick="createNewTrip(); closeHeaderMenu();" class="bg-pink-50 text-pink-600">新旅程</button>
                <button type="button" id="del-trip-menu-btn" onclick="deleteCurrentTrip(); closeHeaderMenu();" class="hidden bg-red-50 text-red-500">刪除</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <section id="content-itinerary" class="space-y-2 flex flex-col tab-panel">
            <div id="trip-schedule-bar" class="hidden bg-surface p-4 rounded-[1.5rem] border border-default shadow-sm space-y-2">
                <button type="button" id="trip-date-trigger" class="trip-date-trigger" onclick="openTripDatePicker()" aria-haspopup="dialog" aria-controls="trip-date-picker">
                    <i class="fas fa-calendar-alt" aria-hidden="true"></i>
                    <span id="trip-date-trigger-text">選擇出發與結束日期</span>
                </button>
                <p id="pill-hint" class="type-micro text-muted">撳一下用月曆選出發同結束</p>
            </div>

            <div id="itinerary-sticky-bar" class="itinerary-sticky-bar">
                <div id="edit-controls" class="itinerary-edit-actions hidden">
                    <button type="button" onclick="addEvent()" class="itinerary-edit-action itinerary-edit-action-primary">+ 新增景點</button>
                    <button type="button" onclick="addDay()" class="itinerary-edit-action">+ 新增一天</button>
                </div>
                <div class="itinerary-sticky-tools">
                    <button type="button" id="search-toggle-btn" class="day-nav-btn day-nav-search" onclick="toggleSearchPanel()" aria-label="搜尋行程" aria-expanded="false" aria-controls="search-panel">
                        <i class="fas fa-search" aria-hidden="true"></i>
                    </button>
                    <button type="button" id="itinerary-edit-btn" class="day-nav-btn day-nav-edit hidden" onclick="toggleEdit()" aria-label="編輯行程">
                        <i class="fas fa-pen" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div id="search-panel" class="hidden space-y-2">
                <div id="search-wrap" class="search-field">
                    <label class="sr-only" for="search-input">搜尋全旅程景點與備註</label>
                    <span class="search-field-icon" aria-hidden="true"><i class="fas fa-search"></i></span>
                    <input type="text" id="search-input" inputmode="search" enterkeyhint="search" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearchInput(this.value)" placeholder="搜尋景點、備註、訂位編號…" class="search-field-input">
                    <button type="button" id="search-clear" onclick="clearSearch()" class="search-field-clear hidden" aria-label="清除搜尋"><i class="fas fa-times-circle"></i></button>
                </div>
                <div id="search-results" class="hidden bg-surface rounded-2xl border border-default overflow-hidden"></div>
            </div>

            <div class="flex overflow-x-auto no-scrollbar px-1" id="day-selector"></div>

            <div id="main-day-card" class="bg-white rounded-[1.5rem] overflow-hidden relative">
                <div id="day-banner" class="day-banner day-banner-date-only relative bg-gray-200 group">
                    <div id="day-banner-date" class="day-banner-date">
                        <p id="day-banner-date-main" class="day-banner-date-main">Day 1</p>
                        <p id="day-banner-date-sub" class="day-banner-date-sub"></p>
                        <p id="day-banner-place" class="day-banner-place hidden"><i class="fas fa-location-dot" aria-hidden="true"></i><span id="day-banner-place-text"></span></p>
                        <div id="day-banner-weather" class="day-banner-weather hidden" aria-label="當日天氣">
                            <span id="day-banner-weather-icon" class="day-banner-weather-icon" aria-hidden="true"></span>
                            <span id="day-banner-weather-temp" class="day-banner-weather-temp"></span>
                            <span id="day-banner-weather-mood" class="day-banner-weather-mood"></span>
                        </div>
                        <span id="day-banner-today-mark" class="day-banner-today-mark hidden">今日</span>
                    </div>
                    <img id="day-img" src="" alt="" class="day-banner-photo w-full h-full object-cover">
                    <div class="day-banner-photo absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <div class="hidden absolute top-4 right-4 flex gap-2" id="day-banner-actions">
                        <button type="button" onclick="copyCurrentDay()" class="btn-banner-action" title="複製整天行程" aria-label="複製整天行程"><i class="fas fa-copy"></i><span>複製</span></button>
                        <button type="button" id="btn-upload-banner" onclick="triggerFile('banner-img-input')" class="btn-banner-action" title="更換當日封面" aria-label="更換當日封面"><i class="fas fa-camera"></i><span>封面</span></button>
                    </div>

                    <div class="day-banner-footer absolute bottom-4 left-5 right-5 text-white">
                        <span id="day-label" class="day-banner-chip mb-2 inline-block">Day Info</span>
                        <div id="day-title-box"></div>
                    </div>
                </div>

                <div class="day-card-body relative">
                    <h2 id="day-title-display" class="day-title-display hidden"></h2>
                    <div id="day-title-edit-panel" class="day-heading-edit hidden">
                        <label for="day-title-input" class="sr-only">當日標題</label>
                        <input type="text" id="day-title-input" placeholder="當日標題，例：上野 · 秋葉原" class="day-heading-input" aria-label="當日標題">
                    </div>
                    <div id="timeline" class="space-y-5 relative min-h-[50px]"></div>
                </div>
            </div>
        </section>

        <!-- Tools Tab -->
        <section id="content-tools" class="hidden space-y-4 pb-10 tab-panel">
            <p id="tools-group-travel" class="tools-group-heading">出門必備</p>

            <div class="tools-travel-stack">
            <div id="tools-weather-card" class="tools-widget-card bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm space-y-3">
                <h2 class="type-body font-heavy text-primary">天氣</h2>
                <div id="weather-widget" class="w-full bg-surface-muted p-3 rounded-2xl border border-default">
                    <div class="weather-widget-controls">
                        <label class="weather-day-field">
                            <span class="type-micro text-muted font-heavy">日期</span>
                            <select id="weather-day-select" onchange="onWeatherDaySelect(parseInt(this.value,10))" class="weather-day-select" aria-label="選擇日期"></select>
                        </label>
                        <label class="weather-day-field">
                            <span class="type-micro text-muted font-heavy">地點</span>
                            <select id="weather-location-select" onchange="onWeatherLocationSelect(this.value)" class="weather-day-select" aria-label="選擇地點"></select>
                        </label>
                    </div>
                    <div class="weather-widget-body">
                        <div id="weather-icon" class="text-xl text-warning shrink-0" aria-hidden="true"><i class="fas fa-sun"></i></div>
                        <div class="overflow-hidden min-w-0 flex-1">
                            <p id="weather-display" class="type-caption text-primary font-heavy">--°C</p>
                            <p id="weather-detail" class="hidden type-micro text-muted truncate"></p>
                        </div>
                        <span id="weather-loading" aria-hidden="true">●</span>
                        <button type="button" onclick="refreshWeather(true)" class="rate-refresh-btn" aria-label="刷新天氣"><i class="fas fa-rotate-right text-secondary type-micro" aria-hidden="true"></i></button>
                    </div>
                </div>
                <p id="weather-coverage-hint" class="type-micro text-muted text-center leading-relaxed"></p>
            </div>

            <div id="tools-rate-card" class="tools-widget-card bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm space-y-3">
                <h2 class="type-body font-heavy text-primary">匯率</h2>
                <div id="rate-widget" class="w-full bg-surface-muted p-3 rounded-2xl border border-default">
                    <div class="rate-currency-row">
                        <label class="rate-currency-field">
                            <span class="type-micro text-muted font-bold">目的地</span>
                            <select id="local-currency-select" onchange="onLocalCurrencySelect(this.value)" class="rate-currency-select" aria-label="目的地貨幣"></select>
                        </label>
                        <button type="button" onclick="swapCurrencies()" class="rate-swap-btn" aria-label="對調貨幣"><i class="fas fa-right-left" aria-hidden="true"></i></button>
                        <label class="rate-currency-field">
                            <span class="type-micro text-muted font-bold">本國</span>
                            <select id="home-currency-select" onchange="onHomeCurrencySelect(this.value)" class="rate-currency-select" aria-label="本國貨幣"></select>
                        </label>
                    </div>
                    <div class="flex items-center gap-1 mt-2">
                        <input type="number" id="curr-local" oninput="convert('local')" placeholder="JPY" class="w-full bg-surface rounded-xl p-2 type-caption font-bold outline-none min-h-[2.25rem] border border-default" inputmode="decimal">
                        <i class="fas fa-arrows-left-right type-micro text-muted shrink-0" aria-hidden="true"></i>
                        <input type="number" id="curr-home" oninput="convert('home')" placeholder="HKD" class="w-full bg-surface rounded-xl p-2 type-caption font-bold outline-none min-h-[2.25rem] border border-default" inputmode="decimal">
                    </div>
                    <div class="rate-line-row mt-1">
                        <p id="rate-line" class="type-micro text-secondary font-bold flex-1 text-center min-w-0 truncate">1 JPY = -- HKD</p>
                        <span id="rate-loading" aria-hidden="true">●</span>
                        <button type="button" onclick="refreshRate(true)" class="rate-refresh-btn" aria-label="刷新匯率"><i class="fas fa-rotate-right text-secondary type-micro" aria-hidden="true"></i></button>
                    </div>
                    <p id="rate-detail" class="hidden type-micro text-muted text-center truncate mt-0.5"></p>
                </div>
            </div>
            </div>

            <div id="tools-docs-card" class="bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="type-body font-heavy text-primary">重要文件</h2>
                    <button type="button" id="btn-upload-doc" onclick="triggerFile('lib-file-input')" class="hidden btn-primary-sm chip-label px-3 py-2">上傳</button>
                </div>
                <div id="doc-list" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div id="tools-checklist-card" class="bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="type-body font-heavy text-primary">行李清單</h2>
                    <button type="button" id="btn-add-check" onclick="addCheck()" class="hidden type-micro font-heavy text-pink-500 px-3 py-1.5 bg-pink-50 rounded-xl">+ 新增</button>
                </div>
                <div id="check-progress-wrap" class="hidden mb-4">
                    <div class="flex justify-between type-micro font-heavy text-secondary mb-1">
                        <span id="check-progress-text"></span>
                    </div>
                    <div class="progress-track"><div id="check-progress-fill" class="progress-fill" style="width:0%"></div></div>
                </div>
                <div id="check-templates" class="hidden flex flex-wrap gap-2 mb-4">
                    <button type="button" onclick="applyCheckTemplate('short')" class="chip-label px-3 py-1.5 bg-pink-50 text-pink-600 rounded-xl">輕旅行</button>
                    <button type="button" onclick="applyCheckTemplate('winter')" class="chip-label px-3 py-1.5 bg-pink-50 text-pink-600 rounded-xl">冬季</button>
                    <button type="button" onclick="applyCheckTemplate('business')" class="chip-label px-3 py-1.5 bg-pink-50 text-pink-600 rounded-xl">出差</button>
                </div>
                <div id="check-list" class="space-y-3"></div>
            </div>

            <p id="tools-group-backup" class="tools-group-heading mt-2">備份與分享</p>

            <div id="tools-share-card" class="bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm space-y-3">
                <h2 class="type-body font-heavy text-primary">分享與列印</h2>
                <div class="flex gap-2">
                    <button type="button" onclick="shareCurrentTrip()" class="flex-1 btn-primary-sm py-3"><i class="fas fa-share-alt mr-1"></i>分享全程</button>
                    <button type="button" onclick="printCurrentTrip()" class="flex-1 btn-ghost-sm py-3"><i class="fas fa-print mr-1"></i>列印／PDF</button>
                </div>
            </div>

            <button type="button" id="tools-settings-toggle" class="tools-settings-toggle mt-2" onclick="toggleToolsSettings()" aria-expanded="false" aria-controls="tools-settings-panel">
                <span>設定與進階</span>
                <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>

            <div id="tools-settings-panel" class="tools-settings-panel hidden">
            <div id="tools-appearance-card" class="bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm">
                <label class="setting-row">
                    <span class="type-body font-heavy text-primary">深色模式</span>
                    <button type="button" id="theme-toggle-btn" onclick="toggleDarkMode()" class="setting-theme-btn" aria-pressed="false" aria-label="切換深色模式">
                        <i id="theme-toggle-icon" class="fas fa-moon" aria-hidden="true"></i>
                    </button>
                </label>
            </div>

            <div id="tools-reminders-card" class="bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm space-y-3">
                <h2 class="type-body font-bold text-primary">出發提醒</h2>
                <label class="setting-row">
                    <span class="type-body font-bold text-primary">開啟提醒</span>
                    <span class="setting-toggle">
                        <input type="checkbox" id="reminder-enabled" onchange="onReminderSettingsChange()" class="setting-toggle-input">
                        <span class="setting-toggle-track" aria-hidden="true"></span>
                    </span>
                </label>
                <label class="setting-row">
                    <span class="type-caption text-secondary">出發前／當日</span>
                    <span class="setting-toggle">
                        <input type="checkbox" id="reminder-departure" onchange="onReminderSettingsChange()" class="setting-toggle-input">
                        <span class="setting-toggle-track" aria-hidden="true"></span>
                    </span>
                </label>
                <div class="flex items-center gap-2 type-caption">
                    <span class="font-bold text-gray-600 shrink-0">每日</span>
                    <select id="reminder-hour" onchange="onReminderSettingsChange()" class="bg-pink-50 rounded-xl px-3 py-2 outline-none font-bold text-pink-600 min-h-[2.75rem]">
                        <option value="7">7:00</option>
                        <option value="8" selected>8:00</option>
                        <option value="9">9:00</option>
                        <option value="10">10:00</option>
                    </select>
                </div>
            </div>

            <div id="storage-warning" class="hidden bg-red-50 p-4 rounded-2xl border border-red-200 type-caption font-bold text-red-600 leading-relaxed"></div>
            <p id="storage-info" class="type-micro text-muted font-bold text-center"></p>

            <div class="bg-surface p-5 rounded-[1.5rem] border border-default shadow-sm space-y-3">
                <h2 class="type-body font-bold text-primary">離線與安裝</h2>
                <p class="type-caption text-gray-500">曾連線開啟一次後可離線用。Safari／Chrome 選「加入主畫面」。</p>
                <p id="pwa-install-hint" class="hidden type-caption text-pink-500 font-bold">可安裝 App 或加入主畫面</p>
            </div>

            <div class="tools-advanced-bar">
                <button type="button" id="tools-advanced-btn" onclick="toggleToolsAdvancedMenu()" class="tools-settings-toggle w-full" aria-label="進階選項" aria-expanded="false" aria-controls="tools-advanced-menu">
                    <span>進階選項</span>
                    <i class="fas fa-ellipsis" aria-hidden="true"></i>
                </button>
            </div>
            </div>
        </section>

        <!-- Today Tab -->
        <section id="content-today" class="hidden space-y-4 pb-10 tab-panel">
            <div id="travel-dashboard" class="bg-surface rounded-[1.5rem] border border-default shadow-sm dashboard-card">
                <button type="button" id="dashboard-travel-toggle" class="dashboard-travel-toggle w-full" onclick="toggleTravelMode()" aria-pressed="false" aria-label="出門模式">
                    <span class="dashboard-travel-toggle-main">
                        <i class="fas fa-suitcase-rolling" aria-hidden="true"></i>
                        <span id="dashboard-travel-label">出門模式</span>
                    </span>
                    <span id="dashboard-travel-state" class="dashboard-travel-state">關</span>
                </button>
                <div class="dashboard-top">
                    <h2 id="dashboard-title" class="sr-only">今日總覽</h2>
                    <p id="dashboard-hint" class="hidden dashboard-hint"></p>
                    <p id="dashboard-day-title" class="dashboard-day-heading hidden"></p>
                </div>
                <div class="dashboard-meta-row">
                    <div id="dashboard-weather" class="hidden" aria-live="polite"></div>
                    <div class="dashboard-meta-actions">
                        <div id="dashboard-progress" class="dashboard-progress hidden" aria-label="今日進度"></div>
                        <button type="button" id="dashboard-jump-btn" onclick="goToToday()" class="dashboard-jump-link" aria-label="查看行程" title="查看行程">
                            <i class="fas fa-map-marked-alt" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
                <div id="dashboard-hero" class="hidden"></div>
                <div id="dashboard-quick-bar" class="dashboard-quick-bar hidden"></div>
                <div id="today-overview-list" class="dashboard-day-list"></div>
            </div>
        </section>
    </main>

    <button type="button" id="fab-quick-add" onclick="quickAddEvent()" class="hidden" aria-label="快速新增景點">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Navigation -->
    <nav class="app-bottom-nav" aria-label="主選單">
        <button type="button" onclick="setTab('today')" id="nav-today" class="nav-tab-active flex-1 py-3 flex flex-col items-center gap-0.5 rounded-[2rem]">
            <i class="fas fa-calendar-day text-sm" aria-hidden="true"></i>
            <span class="nav-tab-label">今日</span>
        </button>
        <button type="button" onclick="setTab('itinerary')" id="nav-itinerary" class="flex-1 py-3 flex flex-col items-center gap-0.5 rounded-[2rem] text-muted">
            <i class="fas fa-map-marked-alt text-sm" aria-hidden="true"></i>
            <span class="nav-tab-label">行程</span>
        </button>
        <button type="button" onclick="setTab('tools')" id="nav-tools" class="flex-1 py-3 flex flex-col items-center gap-0.5 rounded-[2rem] text-muted">
            <i class="fas fa-briefcase text-sm" aria-hidden="true"></i>
            <span class="nav-tab-label">設定及工具</span>
        </button>
    </nav>

    <div id="tools-advanced-menu" class="hidden" role="dialog" aria-label="進階選項" onclick="if(event.target===this)closeToolsAdvancedMenu()">
        <div class="sheet" onclick="event.stopPropagation()">
            <p class="type-caption text-muted mb-3">進階選項</p>
            <button type="button" onclick="closeToolsAdvancedMenu();loadDemoTrip()" class="btn-ghost-sm w-full py-3 mb-2"><i class="fas fa-bolt text-accent mr-1"></i>載入東京示範行程</button>
            <button type="button" onclick="closeToolsAdvancedMenu();cleanupUnusedImages()" class="btn-ghost-sm w-full py-3 mb-2">清理未使用圖片</button>
            <button type="button" onclick="closeToolsAdvancedMenu();resetAll()" class="btn-danger-solid w-full">重設所有數據</button>
            <button type="button" class="type-caption text-muted mt-3 w-full min-h-[2.75rem]" onclick="closeToolsAdvancedMenu()">取消</button>
        </div>
    </div>

    <div id="event-edit-picker" class="hidden" role="dialog" aria-label="編輯景點" onclick="if(event.target===this)closeEventEditSheet()">
        <div class="sheet sheet-tall" onclick="event.stopPropagation()">
            <p class="type-caption text-muted mb-1">編輯景點</p>
            <p id="event-edit-picker-loc" class="type-body font-bold text-primary mb-3 truncate"></p>
            <div id="event-edit-picker-body" class="event-edit-sheet-body"></div>
            <button type="button" class="type-caption text-muted mt-3 w-full min-h-[2.75rem]" onclick="closeEventEditSheet()">完成</button>
        </div>
    </div>

    <div id="trip-date-picker" class="hidden" role="dialog" aria-label="選擇行程日期" onclick="if(event.target===this)closeTripDatePicker()">
        <div class="sheet sheet-tall" onclick="event.stopPropagation()">
            <p class="type-caption text-muted mb-1">選擇行程日期</p>
            <p id="trip-date-picker-hint" class="type-micro text-muted mb-3">先選出發日期</p>
            <div id="trip-date-picker-cal" class="trip-date-cal"></div>
            <div class="trip-date-picker-actions">
                <button type="button" onclick="clearTripDateRangeDraft()" class="btn-ghost-sm">清除</button>
                <button type="button" onclick="confirmTripDateRange()" class="btn-primary-sm flex-1">確定</button>
            </div>
            <button type="button" class="type-caption text-muted mt-2 w-full min-h-[2.75rem]" onclick="closeTripDatePicker()">取消</button>
        </div>
    </div>

    <div id="event-status-picker" class="hidden" role="dialog" aria-label="景點狀態" onclick="if(event.target===this)closeEventStatusPicker()">
        <div class="sheet" onclick="event.stopPropagation()">
            <p class="type-caption text-muted mb-1">景點狀態</p>
            <p id="event-status-picker-loc" class="type-body font-bold text-primary mb-3 truncate"></p>
            <div id="event-status-picker-options" class="status-picker-options"></div>
            <button type="button" class="type-caption text-muted mt-2 w-full min-h-[2.75rem]" onclick="closeEventStatusPicker()">取消</button>
        </div>
    </div>

    <div id="app-modal" class="hidden fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="absolute inset-0 bg-black/40" data-modal-dismiss></div>
        <div class="relative w-full max-w-sm bg-white rounded-[2rem] p-6 shadow-2xl border border-pink-50">
            <h3 id="modal-title" class="type-body font-heavy text-primary mb-2"></h3>
            <p id="modal-message" class="hidden type-caption text-secondary mb-4 leading-relaxed"></p>
            <input id="modal-input" type="text" class="hidden w-full bg-pink-50 rounded-xl px-3 py-2.5 type-body font-heavy outline-none focus:ring-2 focus:ring-pink-200 mb-4">
            <div class="flex gap-2">
                <button type="button" id="modal-cancel" class="flex-1 py-3 rounded-2xl type-caption font-heavy text-secondary bg-gray-50">取消</button>
                <button type="button" id="modal-confirm" class="btn-inverse flex-1 py-3 rounded-2xl type-caption font-heavy">確定</button>
            </div>
        </div>
    </div>

    <div id="print-preview" class="hidden print-preview" role="dialog" aria-label="列印預覽">
        <div class="print-preview-bar">
            <button type="button" onclick="closePrintPreview()" class="print-preview-back"><i class="fas fa-arrow-left" aria-hidden="true"></i> 返回</button>
            <span class="print-preview-title">行程預覽</span>
            <button type="button" onclick="runPrintPreview()" class="print-preview-print"><i class="fas fa-print" aria-hidden="true"></i> 列印／PDF</button>
        </div>
        <iframe id="print-preview-frame" class="print-preview-frame" title="列印預覽"></iframe>
    </div>

    <div id="onboarding" class="onboarding" role="dialog" aria-modal="true" aria-label="新手引導" aria-hidden="true">
        <div class="onboarding-card">
            <div id="onboarding-dots" class="onboarding-dots"></div>
            <div id="onboarding-body"></div>
            <div class="onboarding-actions">
                <button type="button" id="onboarding-back" class="btn-ghost-sm hidden" onclick="onboardingBack()">上一步</button>
                <button type="button" class="btn-ghost-sm" onclick="skipOnboarding()">跳過</button>
                <button type="button" id="onboarding-next" class="btn-primary-sm flex-1" onclick="onboardingNext()">下一步</button>
            </div>
        </div>
    </div>

    <script src="js/share-print.js"></script>
    <script src="js/reminders.js"></script>
    <script src="js/weather-locations.js"></script>
    <script src="js/demo-data.js"></script>
    <script src="js/onboarding.js"></script>
    <script src="js/ui-ux.js"></script>
    <script src="app.js"></script>
    <script src="js/trip-calendar.js"></script>
</body>
</html>
